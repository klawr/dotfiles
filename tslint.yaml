
extends:
    - tslint:recommended
    - tslint-eslint-rules
rules:
    arrow-parens: false
    brace-style:
        - true
        - allman
    import-spacing: false
    indent:
        - true
        - spaces
        - 4
    interface-name: false
    max-line-length:
        - true
        - 100
    new-line-before-return: true
    one-line: false
    quotemark:
        - true
        - single
        - avoid-escape
