--[[# Author  : Juddly
	# Name: Juddly's SweetKDERCLeft Conky
]]


conky.config = {
	alignment = 'top_right',
	use_xft = true,
	xftalpha = 0.8,
	font = 'Noto:normal:size=8',
	text_buffer_size = 2048,
	update_interval = 1.0,
	total_run_times = 0,
	background = true,
	double_buffer = true,
	no_buffers = true,
	imlib_cache_size = 0,
	update_interval = .5,
	cpu_avg_samples = 2,
	own_window = true,
    own_window_class = 'Conky',
    own_window_argb_visual = true,
    own_window_argb_value = 127,
    own_window_transparent = true,
    own_window_type = 'normal',
    own_window_hints = 'undecorated,below,skip_taskbar,sticky,skip_pager',
	own_window_colour = '000000',
	draw_shades = no,
	default_shade_color = '000000',
	draw_outline = no,
	default_outline_color = '000000',
	draw_borders = no,
	gap_x = -1910,
    gap_y = 550,
    minimum_height = 5,
    minimum_width = 220,
	draw_graph_borders = true,
	show_graph_scale = no,
	show_graph_range = no,
	short_units = yes,
	override_utf8_locale = yes,
	uppercase = no,
	default_color = 'ffffff',
	color1 = 'c50ed2',
	color2 = 'fc8b3b',
	color3 = '4491e1',
	color4 = '00ffca',
	color5 = '161925',
	use_spacer = none,
}

conky.text = [[
#Title
#${alignc}${font Noto:bold:size=18}Juddly's Dell XPS
#${color1}${hr}${color}
# day/time
${goto 10}${voffset 5}${font Noto:normal:size=12}${color}${time %A}${font Noto:normal:size=14}${alignr 10}${time %H:%M}${color}
${font Noto:size=9}${goto 10}Date:${color2}${alignr 10}${time %d %B %Y}${color}
#${goto 10}Host:${color2}${alignr 10}${cat /etc/hostname}
${goto 10}${color}Kernel:${alignr 10}${color2}${kernel}-${machine}${color}
${goto 10}Uptime:${color2}${alignr 10}$uptime

#Processor section
${color}${font Noto:bold:size=10}${alignc}CPU${font}
${color1}${hr}${color}
${alignc}${color7}${font Noto:normal:size=10}${exec cat /proc/cpuinfo|grep 'model name'|sed -e 's/model name.*: //'| uniq | cut -c 18-41}
#

#CPUs
#${color}${font Noto:bold:size=10}${alignc}CPUs${font}
${font Noto:normal:size=8}${color}${goto 10}Core 1: ${color2}${cpu cpu1}% ${alignr 10}${color}Temp: ${color2}${exec sensors|grep 'Core 0'|awk '{print $3}'}
${goto 15}${color5}${cpugraph cpu1 25,220 fc8b3b c50ed2 -t}
${color}${goto 10}Core 2: ${color2}${cpu cpu2}% ${alignr 10}${color}Temp: ${color2}${exec sensors|grep 'Core 1'|awk '{print $3}'}
${goto 15}${color5}${cpugraph cpu2 25,220 fc8b3b c50ed2 -t}
${color}${goto 10}Core 3: ${color2}${cpu cpu3}% ${alignr 10}${color}Temp: ${color2}${exec sensors|grep 'Core 2'|awk '{print $3}'}
${goto 15}${color5}${cpugraph cpu3 25,220 fc8b3b c50ed2 -t}
${color}${goto 10}Core 4: ${color2}${cpu cpu4}% ${alignr 10}${color}Temp: ${color2}${exec sensors|grep 'Core 3'|awk '{print $3}'}
${goto 15}${color5}${cpugraph cpu4 25,220 fc8b3b c50ed2 -t}

# top processes
${voffset -5}${font Noto:bold:size=10}${color}${alignc}Top Processes ${font}
${color}${voffset 4}${goto 10}${top name 1}${alignr 10}${color1}${top cpu 1}%
${color2}${goto 10}${voffset -2}${top name 2}${alignr 10}${color}${top cpu 2}%
${color2}${goto 10}${voffset -2}${top name 3}${alignr 10}${color}${top cpu 3}%
${color2}${goto 10}${voffset -2}${top name 4}${alignr 10}${color}${top cpu 4}%
#

# top memory
${voffset -5}${font Noto:bold:size=10}${color}${alignc}Memory${font}
${color1}${hr}${color}
${goto 20}${color5}${memgraph 25,220 fc8b3b c50ed2 -t }
${goto 10}${color}Current RAM Usage: ${alignr 10}${color1}${memperc}%
${goto 10}${color2}${voffset -2}${top_mem name 1}${alignr 10}${color}${top mem 1}%
${color2}${goto 10}${voffset -2}${top_mem name 2}${alignr 10}${color}${top mem 2}%
${color2}${goto 10}${voffset -2}${top_mem name 3}${alignr 10}${color}${top mem 3}%
#

#network
${voffset -5}${font Noto:bold:size=10}${color}${alignc}Network
${color1}${hr}${color}
#${font}${goto 10}Network SSID: ${alignr 10}${wireless_essid enp5s0}
#${goto 10}Signal: ${color2}${wireless_link_bar 10,160 wlp1s0}${color}${alignr 10}${wireless_link_qual_perc wlp1s0}%

#${font}${goto 10}Internal: ${alignr 10}${addr wlp1s0}
#${font}${goto 10}External: ${font Noto:bold:9}${alignr 10}${exec curl ipinfo.io/ip}
${font}${voffset 5}${goto 15}${color}Up: ${color6}${upspeed enp5s0}${goto 140}${color}Down: ${color6}${downspeed enp5s0}
${color}${goto 15}${voffset 0}Total up: ${color6}${totalup enp5s0}${goto 140}${color}Total down: ${color6}${totaldown enp5s0}
${goto 15}${color5}${upspeedgraph enp5s0 25,110 fc8b3b c50ed2 -t} ${alignr}${color5}${downspeedgraph enp5s0 25,110 fc8b3b c50ed2 -t}

#Storage
${font Noto:bold:size=10}${alignc}${color}Storage${font}
${color1}${hr 1}${color}
#${goto 10}${color}Disk I/O Scheduler: ${color2}${alignr 10}${ioscheduler sdb}
${goto 10}${color}SSD:      ${goto 140}${color}${fs_used /}${color}  /  ${color2}${fs_size /}
${goto 10}${color}Read: ${color2}${diskio_read sdb} ${color}${goto 140}Write: ${color2}${diskio_write sdb}
${goto 10}${color5}${diskiograph_read sdb 25,110 fc8b3b c50ed2 -t} ${alignr}${color5}${diskiograph_write sdb 25,110 fc8b3b c50ed2 -t}
#${goto 10}${color2}Available:  ${alignr 10}${color6}${fs_free_perc /}%

#NVIDIA
${font Noto:bold:size=10}${alignc}${color}GPU${font}
${color1}${hr 1}${color}

${goto 10}${color}GPU Util: ${alignr}${color1}${nvidia gpuutil}% ${voffset -10}${color5}${nvidiagraph gpuutil 25,110 fc8b3b c50ed2 -t}
${goto 10}${color}Memory: ${alignr}${color1}${nvidia membwutil}% ${voffset -10}${color5}${nvidiagraph membwutil 25,110 fc8b3b c50ed2 -t}
${goto 10}${color}Temp: ${alignr}${color2}+${nvidia gputemp}°C ${voffset -10}${color5}${nvidiagraph gputemp 25,110 fc8b3b c50ed2 -t}

]]
